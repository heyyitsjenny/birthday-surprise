<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #2b0033, #0d001a);
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;
    color: #fff;
}

h1 {
    font-family: 'Pacifico', cursive;
    background: linear-gradient(45deg, #ff99cc, #ff4da6, #ff66ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.page { display: none; padding: 40px; }
.active { display: block; }

button {
    padding: 15px 25px;
    border: none;
    background: #ff4da6;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* Curtains */
.curtain {
    position: fixed;
    width: 50%;
    height: 100%;
    background: #ff4da6;
    top: 0;
    z-index: 2;
    transition: 2s;
}
.left { left: 0; }
.right { right: 0; }

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

/* Hearts */
.heart {
    position: fixed;
    color: pink;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 3s linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8d4c.mp3" type="audio/mpeg">
</audio>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div id="page2" class="page active">
    <h1 id="typingText"></h1>
    <h2 id="cake">🎂 18 🕯️</h2>
    <button onclick="blowCandle()">Blow candle 💨</button>
</div>

<div id="page3" class="page">
    <h1>💖 Happy 18 Allwinaaaaa 💖</h1>
    <p>
        Thank you for being in my life 💕<br><br>
        I love you endlessly ♾️💖<br><br>
        Stay happy forever ✨
    </p>

    <img src="https://i.imgur.com/8Km9tLL.jpg" 
         style="width:200px; border-radius:20px; margin-top:20px;">

    <br><br>
    <button onclick="finalMessage()">One last thing 💌</button>
</div>

<script>

window.onload = () => {
    startExperience();
};

function startExperience() {
    let music = document.getElementById("bgMusic");
    music.volume = 0.5;
    music.play().catch(() => {});

    document.body.classList.add("open");
    createHearts();

    setTimeout(() => {
        startTyping();
    }, 2000);
}

let text = "Happy 18th Birthday, my Allwinaaaaa 💖";
let i = 0;

function startTyping() {
    function type() {
        if (i < text.length) {
            document.getElementById("typingText").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 60);
        }
    }
    type();
}

function blowCandle() {
    document.getElementById("cake").innerHTML = "💨";
    createConfetti();
    setTimeout(() => showPage("page3"), 2000);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

function finalMessage() {
    alert("I love you more than words can say 💖");
}

</script>

</body>
</html>
