<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #2b0033, #0d001a);
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;
    color: #fff;
}

h1 {
    font-family: 'Pacifico', cursive;
    color: #ff99cc;
}

.page { display: none; padding: 40px; }
.active { display: block; }

button {
    padding: 15px 25px;
    border: none;
    background: #ff4da6;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* Curtains */
.curtain {
    position: fixed;
    width: 50%;
    height: 100%;
    background: #ff4da6;
    top: 0;
    z-index: 10;
    transition: 2s;
}
.left { left: 0; }
.right { right: 0; }

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

/* Hearts */
.heart {
    position: fixed;
    color: pink;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 3s linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8d4c.mp3" type="audio/mpeg">
</audio>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div id="page1" class="page active">
    <h1>Tap to open your surprise 💌</h1>
    <button onclick="openCurtain()">Open</button>
</div>

<div id="page2" class="page">
    <h1 id="typingText"></h1>
    <h2>🎂 18 🕯️</h2>
    <button onclick="blowCandle()">Blow candle 💨</button>
</div>

<div id="page3" class="page">
    <h1>💖 Happy 18 Allwinaaaaa 💖</h1>
    <p>
        Thank you for being in my life 💕<br><br>
        I love you endlessly ♾️💖<br><br>
        Stay happy forever, my Allwinaaaaa ✨
    </p>
</div>

<script>

function openCurtain() {
    document.getElementById("bgMusic").play();
    document.body.classList.add("open");
    setTimeout(() => {
        showPage("page2");
        startTyping();
    }, 2000);
}

let text = "Happy 18th Birthday, my Allwinaaaaa 💖";
let i = 0;

function startTyping() {
    function type() {
        if (i < text.length) {
            document.getElementById("typingText").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 60);
        }
    }
    type();
}

function blowCandle() {
    createConfetti();
    setTimeout(() => showPage("page3"), 2000);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

</script>

</body>
</html>
